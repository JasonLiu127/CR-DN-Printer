const GC={Document:{bg:"#dbeafe",border:"#3b82f6",text:"#1e40af"},Party:{bg:"#dcfce7",border:"#22c55e",text:"#15803d"},Reference:{bg:"#fef9c3",border:"#eab308",text:"#854d0e"},Shipment:{bg:"#ede9fe",border:"#8b5cf6",text:"#5b21b6"},"Line Item":{bg:"#fee2e2",border:"#ef4444",text:"#991b1b"}};
const ALIASES={DOC_NUMBER:["doc number","cn","c/n","d/n","inv","document number","doc no"],DOC_TYPE:["doc type","document type","type","note type"],DATE:["date","doc date","invoice date","issue date"],COMPANY_ID:["company","division","company id","entity","branch"],CLIENT_NAME:["client","customer","client name","customer name","bill to","debit to","credit to"],CLIENT_ADDRESS:["address","client address","customer address"],MBL:["mbl","master bl","master bill"],HBL:["hbl","house bl","house bill"],CUSTOMER_REF:["customer ref","ref#","customer reference","po number"],POL:["pol","port of loading","origin port"],VESSEL:["vessel","voyage","vessel/voyage"],FINAL_DEST:["final destination","destination","final dest","pod"],ETD:["etd","departure date","sailing date"],ETA:["eta","estimated arrival","arrival date"],SHIPPER:["shipper","sender","exporter"],CONSIGNEE:["consignee","receiver","importer"],SHIP_MODE:["ship mode","mode","shipping mode"],CONTAINER_NO:["container","container no","container number","cntr"],PACKAGES:["packages","pcs","cartons","pieces"],WEIGHT:["weight","gross weight","kg"],CBM:["cbm","measurement","volume","cubic"],ITEM_DESC:["description","item","service","item description","desc"],UNIT:["unit","qty","quantity"],CURRENCY:["currency","ccy","cur"],RATE:["rate","unit price","unit rate","price"],AMOUNT:["amount","total","debit","credit","charges","fee","fees"],REMARK:["remark","remarks","note","notes"]};

// ── FORMATTERS ────────────────────────────────────────────────────────────────
const cleanDate=v=>{if(!v&&v!==0)return"";const s=String(v).trim();if(/^\d{5}$/.test(s)){const d=new Date(Math.round((parseFloat(s)-25569)*86400*1000));if(!isNaN(d))return`${String(d.getUTCMonth()+1).padStart(2,"0")}/${String(d.getUTCDate()).padStart(2,"0")}/${String(d.getUTCFullYear()).slice(-2)}`;}const m1=s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);if(m1)return`${m1[2].padStart(2,"0")}/${m1[3].padStart(2,"0")}/${m1[1].slice(-2)}`;const m2=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);if(m2)return`${m2[1].padStart(2,"0")}/${m2[2].padStart(2,"0")}/${String(m2[3]).slice(-2)}`;return s;};
const cleanNum=v=>{if(!v&&v!==0)return"";const n=parseFloat(String(v).replace(/[^0-9.\-]/g,""));return isNaN(n)?"":String(n);};
const cleanRate=v=>String(v||"").trim();
const fmtNum=v=>{const n=parseFloat(String(v||"").replace(/[^0-9.\-]/g,""));return isNaN(n)?"0.00":n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});};
const cleanDocType=v=>{const x=String(v||"").toLowerCase();if(x.includes("credit"))return"Credit Note";if(x.includes("debit"))return"Debit Note";if(x.includes("receipt"))return"Receipt";if(x.includes("invoice"))return"Invoice";return v;};
const cleanCur=v=>{const x=String(v||"").toUpperCase().trim();return CURRENCIES.includes(x)?x:x||"USD";};
const applyFmt=(v,f)=>{switch(f){case"date":return cleanDate(v);case"number":return cleanNum(v);case"rate":return cleanRate(v);case"doctype":return cleanDocType(v);case"currency":return cleanCur(v);default:return String(v||"").trim();}};
const autoMatch=headers=>{const rev={};headers.forEach(h=>{const n=h.toLowerCase().trim().replace(/[_\-\.]/g," ");for(const[t,a]of Object.entries(ALIASES)){if(a.some(x=>n===x||n.includes(x)||x.includes(n))){if(!Object.values(rev).includes(t)){rev[t]=h;break;}}}});return rev;};
const parseCSV=text=>{const lines=text.split(/\r?\n/).filter(Boolean);if(!lines.length)return{headers:[],rows:[]};const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());const rows=lines.slice(1).map(line=>{const vals=[];let cur="",inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;continue;}if(ch===","&&!inQ){vals.push(cur.trim());cur="";continue;}cur+=ch;}vals.push(cur.trim());const obj={};headers.forEach((h,i)=>obj[h]=vals[i]??"");return obj;});return{headers,rows};};
const parseXLSX=file=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"array",cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false,dateNF:"mm/dd/yy"});res({headers:data.length?Object.keys(data[0]):[],rows:data});}catch(e){rej(e);}};r.readAsArrayBuffer(file);r.onerror=rej;});

const groupIntoDocs=(rows,mapping,companies)=>{
  const docs={};const order=[];
  rows.forEach(row=>{
    const get=field=>{const sc=mapping[field]||"";return sc?row[sc]:"";};
    const docNum=applyFmt(get("DOC_NUMBER"),"text")||`DOC_${Math.random()}`;
    if(!docs[docNum]){
      order.push(docNum);
      const coId=applyFmt(get("COMPANY_ID"),"text")||"jks";
      docs[docNum]={docNumber:docNum,docType:applyFmt(get("DOC_TYPE"),"doctype")||"Credit Note",date:applyFmt(get("DATE"),"date"),companyId:coId,party:{name:applyFmt(get("CLIENT_NAME"),"text"),address:applyFmt(get("CLIENT_ADDRESS"),"text")},mbl:applyFmt(get("MBL"),"text"),hbl:applyFmt(get("HBL"),"text"),customerRef:applyFmt(get("CUSTOMER_REF"),"text"),shipment:{pol:applyFmt(get("POL"),"text"),vessel:applyFmt(get("VESSEL"),"text"),finalDest:applyFmt(get("FINAL_DEST"),"text"),etd:applyFmt(get("ETD"),"date"),eta:applyFmt(get("ETA"),"date"),packages:applyFmt(get("PACKAGES"),"number"),weight:applyFmt(get("WEIGHT"),"number"),cbm:applyFmt(get("CBM"),"number"),shipper:applyFmt(get("SHIPPER"),"text"),shipMode:applyFmt(get("SHIP_MODE"),"text"),containerNo:applyFmt(get("CONTAINER_NO"),"text"),consignee:applyFmt(get("CONSIGNEE"),"text")},items:[]};
    }
    const doc=docs[docNum];
    const sm={"pol":"POL","vessel":"VESSEL","finalDest":"FINAL_DEST","etd":"ETD","eta":"ETA","packages":"PACKAGES","weight":"WEIGHT","cbm":"CBM","shipper":"SHIPPER","shipMode":"SHIP_MODE","containerNo":"CONTAINER_NO","consignee":"CONSIGNEE"};
    Object.entries(sm).forEach(([sf,ff])=>{if(!doc.shipment[sf]){const tf=TARGET_FIELDS.find(f=>f.field===ff);const v=applyFmt(get(ff),tf?.fmt||"text");if(v)doc.shipment[sf]=v;}});
    if(!doc.party.name){const v=applyFmt(get("CLIENT_NAME"),"text");if(v)doc.party.name=v;}
    if(!doc.party.address){const v=applyFmt(get("CLIENT_ADDRESS"),"text");if(v)doc.party.address=v;}
    doc.items.push({desc:applyFmt(get("ITEM_DESC"),"text"),unit:applyFmt(get("UNIT"),"number")||"1",currency:applyFmt(get("CURRENCY"),"currency")||"USD",rate:cleanRate(get("RATE")),amount:applyFmt(get("AMOUNT"),"number"),remark:applyFmt(get("REMARK"),"text")});
  });
  return order.map(n=>docs[n]);
};

});

const getBankForDoc=(doc,companies)=>{
  const co=companies.find(c=>c.id===doc.companyId);
  if(!co||!co.banks||!co.banks.length)return BUILT_IN_COMPANIES[0].banks[0];
  const cur=doc.items[0]?.currency||"USD";
  return co.banks.find(b=>b.currency===cur)||co.banks[0];
};

// ── IMAGE DIMS ────────────────────────────────────────────────────────────────
const getImgDims=(dataUrl,maxW,maxH)=>new Promise(res=>{
  const img=new Image();
  img.onload=()=>{const ar=img.width/img.height;let w=maxW,h=maxW/ar;if(h>maxH){h=maxH;w=maxH*ar;}res({w,h});};
  img.onerror=()=>res({w:maxW,h:maxH/2});
  img.src=dataUrl;
});

// ── PDF GENERATOR ─────────────────────────────────────────────────────────────
const generatePDF=async(doc,co,bank)=>{
  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const lbl=DOC_LABELS[doc.docType]||DOC_LABELS["Credit Note"];
  const total=doc.items.reduce((s,i)=>s+(parseFloat(i.amount)||((parseFloat(String(i.rate).replace(/[^0-9.\-]/g,""))||0)*(parseFloat(i.unit)||1))),0);
  const W=210,M=14,CW=W-M*2;let y=M;
  const hexRgb=hex=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];};
  const[pr,pg,pb]=hexRgb(co.primary||"#3a7bd5");
  const[sr,sg,sb]=hexRgb(co.secondary||"#2c3e50");
  const t=(text,x,yy,size=9,style="normal",color=[34,34,34],align="left")=>{
    pdf.setFontSize(size);pdf.setFont("helvetica",style);pdf.setTextColor(...color);
    pdf.text(String(text||""),x,yy,{align});
  };
  let headerH=14;
  if(co.logo){try{const{w,h}=await getImgDims(co.logo,50,16);pdf.addImage(co.logo,"PNG",M,y,w,h);headerH=h+2;}catch{t(co.name,M,y+8,11,"bold",[sr,sg,sb]);}}
  else{pdf.setFillColor(sr,sg,sb);pdf.roundedRect(M,y,10,10,1,1,"F");pdf.setTextColor(pr,pg,pb);pdf.setFontSize(7);pdf.setFont("helvetica","bold");pdf.text(co.abbr,M+5,y+6.5,{align:"center"});t(co.name,M+12,y+7,11,"bold",[sr,sg,sb]);headerH=12;}
  t(doc.docType.toUpperCase(),W-M,y+headerH*0.6,15,"bold",[pr,pg,pb],"right");
  y+=headerH+2;
  pdf.setDrawColor(pr,pg,pb);pdf.setLineWidth(0.7);pdf.line(M,y,W-M,y);y+=6;
  t(lbl.party,M,y,7,"bold",[pr,pg,pb]);y+=4;
  t(doc.party.name||"—",M,y,10,"bold",[20,20,20]);y+=5;
  t(doc.party.address||"",M,y,8,"normal",[80,80,80]);
  const refY=y-9;
  const refs=[["DATE:",doc.date],[lbl.ref+":",doc.docNumber],["MBL:",doc.mbl],["HBL:",doc.hbl],["CUST REF:",doc.customerRef]].filter(([,v])=>v);
  refs.forEach(([l,v],i)=>{t(l,W-M-52,refY+i*4.5,7.5,"bold",[sr,sg,sb]);t(v,W-M,refY+i*4.5,7.5,"normal",[20,20,20],"right");});
  y=Math.max(y+8,refY+refs.length*4.5+4);

  // ── SHIPMENT (conditional) ──
  if(shipHasData(doc.shipment)){
    pdf.setFillColor(sr,sg,sb);pdf.rect(M,y,CW,5,"F");
    t("SHIPMENT DETAILS",M+2,y+3.5,7,"bold",[255,255,255]);y+=5;
    pdf.setFillColor(248,250,252);pdf.rect(M,y,CW,32,"F");
    const shipFields=[["P.O.L",doc.shipment.pol],["Vessel / Voyage",doc.shipment.vessel],["Final Destination",doc.shipment.finalDest],["ETD",doc.shipment.etd],["ETA",doc.shipment.eta],["Packages (PCS)",doc.shipment.packages],["Shipper",doc.shipment.shipper],["Weight (KG)",doc.shipment.weight],["CBM",doc.shipment.cbm],["Ship Mode",doc.shipment.shipMode],["Container No.",doc.shipment.containerNo],["Consignee",doc.shipment.consignee]];
    const colW=CW/3;
    shipFields.forEach(([l,v],i)=>{const col=i%3,row=Math.floor(i/3);const cx=M+col*colW+2,cy=y+row*8+3;t(l.toUpperCase(),cx,cy,6,"bold",[sr,sg,sb]);t(v||"—",cx,cy+3.8,7.5,"normal",[30,30,30]);});
    y+=32+2;
    pdf.setDrawColor(220,220,220);pdf.setLineWidth(0.2);pdf.line(M,y,W-M,y);y+=4;
  }

  // ── LINE ITEMS ──
  // FIX: cols was accidentally embedded in a comment in v24 — now properly defined here
  const cols=[
    {x:M,      w:70,          label:"DESCRIPTION", align:"left"},
    {x:M+70,   w:14,          label:"UNIT",         align:"right"},
    {x:M+84,   w:14,          label:"CCY",          align:"center"},
    {x:M+98,   w:22,          label:"RATE",         align:"right"},
    {x:M+120,  w:22,          label:lbl.amount,     align:"right"},
    {x:M+142,  w:CW-142,      label:"REMARK",       align:"left"},
  ];
  pdf.setFillColor(sr,sg,sb);pdf.rect(M,y,CW,5.5,"F");
  cols.forEach(c=>{
    const tx=c.align==="right"?c.x+c.w-1:c.align==="center"?c.x+c.w/2:c.x+1;
    t(c.label,tx,y+3.8,6,"bold",[255,255,255],c.align);
  });
  y+=5.5;
  doc.items.forEach((it,i)=>{
    const rowH=6.5;
    if(i%2===0){pdf.setFillColor(249,250,251);pdf.rect(M,y,CW,rowH,"F");}
    const amt=parseFloat(it.amount)||((parseFloat(String(it.rate).replace(/[^0-9.\-]/g,""))||0)*(parseFloat(it.unit)||1));
    t(it.desc||"—",cols[0].x+1,y+4.2,7.5,"normal",[20,20,20]);
    t(fmtNum(it.unit),cols[1].x+cols[1].w-1,y+4.2,7.5,"normal",[20,20,20],"right");
    t(it.currency||"USD",cols[2].x+cols[2].w/2,y+4.2,7.5,"normal",[20,20,20],"center");
    t(it.rate||"",cols[3].x+cols[3].w-1,y+4.2,7.5,"normal",[20,20,20],"right");
    t(fmtNum(amt),cols[4].x+cols[4].w-1,y+4.2,7.5,"bold",[20,20,20],"right");
    t(it.remark||"",cols[5].x+1,y+4.2,7,"normal",[80,80,80]);
    y+=rowH;
  });
  pdf.setDrawColor(220,220,220);pdf.setLineWidth(0.2);pdf.line(M,y,W-M,y);y+=4;
  pdf.setDrawColor(pr,pg,pb);pdf.setLineWidth(0.5);pdf.roundedRect(W-M-50,y,50,10,1,1,"S");
  t("TOTAL "+lbl.amount,W-M-48,y+3.5,6,"bold",[sr,sg,sb]);
  t(`${doc.items[0]?.currency||"USD"} ${fmtNum(total)}`,W-M-2,y+7.5,10,"bold",[pr,pg,pb],"right");
  y+=16;
  if(isCreditNote(doc)){
    t("This credit note will be applied against outstanding or future invoices.",M,y,7.5,"italic",[120,120,120]);
    y+=8;
  }

  // ── Push bank/sig to bottom ──
  const PAGE_H=297;
  const BOTTOM_MARGIN=14;
  const bankFields=[["Bank Name",bank.name],["Bank Code",bank.bankCode],["Bank Address",bank.address],["Account No.",bank.account],["SWIFT",bank.swift],["Beneficiary",bank.beneficiary]].filter(([,v])=>v);
  const BANK_BLOCK_H=bankFields.length*4+30;
  const targetY=PAGE_H-BOTTOM_MARGIN-BANK_BLOCK_H;
  if(y>240){pdf.addPage();y=M;}else if(targetY>y+10){y=targetY;}

  pdf.setDrawColor(pr,pg,pb);pdf.setLineWidth(0.6);pdf.line(M,y,W-M,y);y+=5;
  t(`BANK ACCOUNT INFO (${bank.currency||"USD"})`,M,y,7,"bold",[sr,sg,sb]);
  t("For and on behalf of",W-M,y,7,"bold",[sr,sg,sb],"right");
  y+=5;
  bankFields.forEach(([l,v])=>{t(l+":",M,y,7,"bold",[sr,sg,sb]);t(v||"",M+26,y,7,"normal",[30,30,30]);y+=4;});
  t(co.short,W-M,y-20,8,"bold",[pr,pg,pb],"right");
  const sigX=M+CW/2;const sigW=CW/2;
  if(co.signature){
    try{
      const{w,h}=await getImgDims(co.signature,56,20);
      const sx=sigX+(sigW-w)/2;
      pdf.addImage(co.signature,"PNG",sx,y-18,w,h);
      y=Math.max(y,y-18+h+2);
    }catch{}
  }
  y+=2;
  pdf.setDrawColor(180,180,180);pdf.setLineWidth(0.2);
  pdf.line(sigX+sigW*0.15,y,sigX+sigW*0.85,y);
  t("Authorized Signature(s)",sigX+sigW/2,y+3.5,7,"normal",[150,150,150],"center");
  return pdf;
};

// ── EXCEL SUMMARY ─────────────────────────────────────────────────────────────
const generateSummaryXLSX=(docs,companies,printedBy,printedAt)=>{
  const wb=XLSX.utils.book_new();
  const headers=["Document #","Doc Type","Date","Company","Client Name","Client Address","MBL","HBL","Customer Ref","POL","Vessel/Voyage","Final Destination","ETD","ETA","Shipper","Consignee","Ship Mode","Container No.","Packages","Weight (KG)","CBM","Item Description","Unit","Currency","Rate","Amount","Remark","Created By","Printed At"];
  const rows=[];
  docs.forEach(doc=>{
    const co=companies.find(c=>c.id===doc.companyId);
    doc.items.forEach((it,i)=>{
      rows.push([
        i===0?doc.docNumber:"",i===0?doc.docType:"",i===0?doc.date:"",i===0?(co?.name||doc.companyId):"",
        i===0?doc.party.name:"",i===0?doc.party.address:"",i===0?doc.mbl:"",i===0?doc.hbl:"",i===0?doc.customerRef:"",
        i===0?doc.shipment.pol:"",i===0?doc.shipment.vessel:"",i===0?doc.shipment.finalDest:"",
        i===0?doc.shipment.etd:"",i===0?doc.shipment.eta:"",i===0?doc.shipment.shipper:"",i===0?doc.shipment.consignee:"",
        i===0?doc.shipment.shipMode:"",i===0?doc.shipment.containerNo:"",i===0?doc.shipment.packages:"",
        i===0?doc.shipment.weight:"",i===0?doc.shipment.cbm:"",
        it.desc,it.unit,it.currency,it.rate,it.amount,it.remark,
        i===0?printedBy:"",i===0?printedAt:"",
      ]);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws["!cols"]=headers.map((_,i)=>({wch:i<4?22:i<9?18:14}));
  XLSX.utils.book_append_sheet(wb,"Print Job Summary",ws);
  const buf=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`PrintJobSummary_${printedBy}_${new Date().toISOString().slice(0,10)}.xlsx`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};

                      <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:8}}>{label}</div>

              <button onClick={clearLog} style={{padding:"6px 14px",border:"1px solid #fca5a5",borderRadius:6,background:"#fef2f2",color:"#dc2626",cursor:"pointer",fontWeight:600,fontSize:12}}>🗑️ Clear</button>

                      <td style={{padding:"6px 10px",fontWeight:600}}>{e.total?`${e.currency||""} ${e.total}`:""}</td>
                      <td style={{padding:"6px 10px",color:"#6b7280",whiteSpace:"nowrap"}}>{e.ts}</td>

}

// ── DATA MAPPER ───────────────────────────────────────────────────────────────
function DataMapper({srcData,mapping,setMapping,defaults,setDefaults,onProceed,onBack}){
  const usageCounts={};Object.values(mapping).forEach(v=>{if(v)usageCounts[v]=(usageCounts[v]||0)+1;});
  const unmapped=TARGET_FIELDS.filter(f=>f.required&&!mapping[f.field]&&!defaults[f.field]);
  return(
    <div style={{maxWidth:940,margin:"0 auto"}}>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        {[[`📄 ${srcData.rows.length} rows`,"#dbeafe","#1e40af"],[`🔗 ${srcData.headers.length} source cols`,"#dcfce7","#15803d"],[`✅ ${Object.values(mapping).filter(Boolean).length} auto-matched`,"#fef9c3","#854d0e"],[`⚪ ${TARGET_FIELDS.length-Object.values(mapping).filter(Boolean).length} unmapped`,"#f3f4f6","#6b7280"]].map(([t,bg,c])=>(
          <div key={t} style={{padding:"5px 14px",borderRadius:20,background:bg,fontSize:12,fontWeight:700,color:c}}>{t}</div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:14,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#374151",marginBottom:10}}>🔧 Batch Defaults</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[{field:"COMPANY_ID",label:"Company Header",options:["","jks","logistico","inline","edit","wapa"],hint:"Leave blank — each doc may differ"},{field:"CURRENCY",label:"Currency",options:["","USD","HKD","EUR","CNY","RMB","GBP","JPY"],hint:"Leave blank — each line may differ"}].map(({field,label,options,hint})=>(
            <div key={field}>
              <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:4,textTransform:"uppercase"}}>{label}</div>
              <select value={defaults[field]||""} onChange={e=>setDefaults({...defaults,[field]:e.target.value})} style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"6px 8px",fontSize:13,outline:"none"}}>
                {options.map(o=><option key={o} value={o}>{o||`— ${hint} —`}</option>)}
              </select>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.06)",marginBottom:14}}>
        <div style={{background:"#1e3a5f",color:"#fff",padding:"10px 16px",display:"grid",gridTemplateColumns:"24px 200px 1fr 110px",gap:12,fontSize:11,fontWeight:700}}>
          <span/><span>JKS FIELD</span><span>YOUR FILE COLUMN</span><span>PREVIEW</span>
        </div>
        <div style={{maxHeight:400,overflowY:"auto"}}>
          {TARGET_FIELDS.map((tf,i)=>{
            const gc=GC[tf.group];const mapped=mapping[tf.field]||"";const isMapped=!!mapped;
            const preview=mapped?(srcData.rows[0]?.[mapped]||""):"";const cnt=usageCounts[mapped]||0;
            return(
              <div key={tf.field} style={{display:"grid",gridTemplateColumns:"24px 200px 1fr 110px",gap:12,padding:"6px 16px",background:i%2?"#f9fafb":"#fff",borderBottom:"1px solid #f3f4f6",alignItems:"center"}}>
                <span style={{width:10,height:10,borderRadius:"50%",display:"inline-block",background:isMapped?"#22c55e":tf.required?"#f87171":"#e5e7eb"}}/>
                <div>
                  <div style={{display:"inline-block",padding:"2px 7px",borderRadius:5,background:gc.bg,border:`1px solid ${gc.border}`,fontSize:11,fontWeight:800,color:gc.text}}>{tf.field}</div>
                  <div style={{fontSize:10,color:"#6b7280",marginTop:2}}>{tf.label}{tf.required&&<span style={{color:"#ef4444"}}> *</span>}</div>
                </div>
                <select value={mapped} onChange={e=>setMapping({...mapping,[tf.field]:e.target.value})}
                  style={{border:`1px solid ${isMapped?"#22c55e":"#d1d5db"}`,borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",background:isMapped?"#f0fdf4":"#fff",color:isMapped?"#15803d":"#9ca3af",fontWeight:isMapped?600:400,width:"100%"}}>
                  <option value="">— not mapped —</option>
                  {srcData.headers.map(h=>{const hc=usageCounts[h]||0;const isThis=h===mapped;return<option key={h} value={h}>{h}{hc>0&&!isThis?` (used ×${hc})`:""}</option>;})}
                </select>
                <div style={{fontSize:11,color:isMapped?"#374151":"#d1d5db",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={preview}>
                  {isMapped&&cnt>1&&<span style={{background:"#fef9c3",color:"#854d0e",borderRadius:4,padding:"1px 5px",fontSize:10,fontWeight:700,marginRight:4}}>×{cnt}</span>}
                  {preview||"—"}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {unmapped.length>0&&<div style={{padding:"10px 14px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,color:"#dc2626",fontSize:13,marginBottom:14}}>⚠️ Required fields not mapped: <strong>{unmapped.map(f=>f.label).join(", ")}</strong></div>}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button onClick={onBack} style={{padding:"9px 20px",borderRadius:8,border:"1px solid #d1d5db",background:"#fff",color:"#374151",cursor:"pointer",fontWeight:600,fontSize:13}}>← Back</button>
        <button onClick={onProceed} disabled={unmapped.length>0} style={{padding:"9px 24px",borderRadius:8,border:"none",background:unmapped.length?"#e5e7eb":"#1e3a5f",color:unmapped.length?"#9ca3af":"#fff",cursor:unmapped.length?"not-allowed":"pointer",fontWeight:700,fontSize:13}}>Generate Documents →</button>
      </div>
    </div>
  );
}

// ── SHIPMENT HELPER ───────────────────────────────────────────────────────────
const shipHasData=s=>s&&Object.values(s).some(v=>v&&String(v).trim()!=="");
const isCreditNote=doc=>doc?.docType==="Credit Note";

// ── DOC LAYOUT (screen) ───────────────────────────────────────────────────────
const DocLayout=React.memo(function DocLayout({doc,co,editable,onChange,companies}){
  const lbl=DOC_LABELS[doc.docType]||DOC_LABELS["Credit Note"];
  const bank=getBankForDoc(doc,companies||BUILT_IN_COMPANIES);
  const total=doc.items.reduce((s,it)=>s+(parseFloat(it.amount)||((parseFloat(String(it.rate).replace(/[^0-9.\-]/g,""))||0)*(parseFloat(it.unit)||1))),0);
  const showShip=editable||shipHasData(doc.shipment);
  const upd=(path,val)=>{if(!editable||!onChange)return;const parts=path.split(".");if(parts.length===1){onChange({...doc,[parts[0]]:val});}else if(parts.length===2){onChange({...doc,[parts[0]]:{...doc[parts[0]],[parts[1]]:val}});}else{const next={...doc};let cur=next;for(let i=0;i<parts.length-1;i++){cur[parts[i]]={...cur[parts[i]]};cur=cur[parts[i]];}cur[parts[parts.length-1]]=val;onChange(next);}};
  const updItem=(i,k,v)=>{if(!editable||!onChange)return;onChange({...doc,items:doc.items.map((it,j)=>j===i?{...it,[k]:v}:it)});};
  const updItemMulti=(i,updates)=>{if(!editable||!onChange)return;onChange({...doc,items:doc.items.map((it,j)=>j===i?{...it,...updates}:it)});};
  const addItem=()=>{if(!editable||!onChange)return;onChange({...doc,items:[...doc.items,{desc:"",unit:"1",currency:doc.items[0]?.currency||"USD",rate:"",amount:"",remark:""}]});};
  const removeItem=i=>{if(!editable||!onChange)return;if(doc.items.length>1)onChange({...doc,items:doc.items.filter((_,j)=>j!==i)});};
  const focusNext=e=>{if(e.key==="Enter"){e.preventDefault();const form=e.target.closest("[data-doclayout]");if(!form)return;const inputs=[...form.querySelectorAll("input,select")];const idx=inputs.indexOf(e.target);if(idx>=0&&idx<inputs.length-1){inputs[idx+1].focus();inputs[idx+1].select?.();}}};
  const renderField=(path,type="text",placeholder="",style={})=>{const val=path.split(".").reduce((o,k)=>o?.[k],doc)??"";if(!editable)return<span style={{fontSize:12,...style}}>{val||"—"}</span>;return<input type={type} value={val} placeholder={placeholder} onChange={e=>upd(path,e.target.value)} onKeyDown={focusNext} style={{border:"1px solid #d1d5db",borderRadius:5,padding:"5px 7px",fontSize:12,outline:"none",width:"100%",...style}}/>;};;
  return(
    <div data-doclayout="true" style={{background:"#fff",fontFamily:"Arial,sans-serif",fontSize:12,color:"#1a1a1a",padding:"28px 36px",width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:6}}>
        <div>{co.logo?<img src={co.logo} alt={co.abbr} style={{height:52,maxWidth:180,objectFit:"contain",objectPosition:"left center",display:"block"}}/>:<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:48,height:48,borderRadius:6,background:co.secondary,display:"flex",alignItems:"center",justifyContent:"center",color:co.primary,fontWeight:900,fontSize:13}}>{co.abbr}</div><div style={{fontSize:14,fontWeight:700,color:co.secondary}}>{co.name}</div></div>}</div>
        <div style={{textAlign:"right",fontSize:22,fontWeight:700,color:co.primary,letterSpacing:1}}>{doc.docType.toUpperCase()}</div>
      </div>
      <div style={{height:3,background:`linear-gradient(90deg,${co.primary},${co.secondary})`,borderRadius:2,marginBottom:14}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 40px",marginBottom:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:co.primary,textTransform:"uppercase",letterSpacing:0.6,marginBottom:5}}>{lbl.party}</div>
          {renderField("party.name","text","Client / Company name",{fontWeight:700,fontSize:13,marginBottom:4})}
          <div style={{height:editable?4:2}}/>{renderField("party.address","text","Full address")}
        </div>
        <div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <tbody>{[["DATE","date","date"],[lbl.ref,"docNumber","text"],["MBL","mbl","text"],["HBL","hbl","text"],["CUSTOMER REF","customerRef","text"]].map(([l,p,t])=>(
              <tr key={p}><td style={{padding:"3px 10px 3px 0",fontWeight:700,color:co.secondary,fontSize:11,whiteSpace:"nowrap",width:120,verticalAlign:"middle"}}>{l}:</td><td style={{padding:"3px 0",verticalAlign:"middle"}}>{renderField(p,t,l)}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
      {showShip&&<div style={{border:`1px solid ${co.primary}40`,borderRadius:6,overflow:"hidden",marginBottom:14}}>
        <div style={{background:co.secondary,color:"#fff",padding:"5px 12px",fontSize:10,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase"}}>Shipment Details</div>
        <div style={{padding:"10px 12px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px 16px",background:"#fafafa"}}>
          {[["P.O.L","shipment.pol"],["Vessel / Voyage","shipment.vessel"],["Final Destination","shipment.finalDest"],["ETD","shipment.etd","date"],["ETA","shipment.eta","date"],["Packages (PCS)","shipment.packages"],["Shipper","shipment.shipper"],["Weight (KG)","shipment.weight"],["Measurement (CBM)","shipment.cbm"],["Ship Mode","shipment.shipMode"],["Container No.","shipment.containerNo"],["Consignee","shipment.consignee"]].map(([l,p,t="text"])=>(
            <div key={p}><div style={{fontSize:9,fontWeight:700,color:co.secondary,textTransform:"uppercase",letterSpacing:0.4,marginBottom:2}}>{l}</div>{renderField(p,t,l)}</div>
          ))}
        </div>
      </div>}
      <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed",marginBottom:editable?6:0,fontSize:12}}>
        <colgroup><col style={{width:"35%"}}/><col style={{width:"9%"}}/><col style={{width:"9%"}}/><col style={{width:"13%"}}/><col style={{width:"13%"}}/><col style={{width:"13%"}}/>{editable&&<col style={{width:"8%"}}/>}</colgroup>
        <thead><tr style={{background:co.secondary,color:"#fff"}}>
          {["Description","Unit","Currency","Rate",lbl.amount,"Remark",...(editable?[""]:[])]
            .map(h=><th key={h} style={{padding:"7px 8px",fontWeight:700,fontSize:10,textAlign:["Rate",lbl.amount].includes(h)?"right":"left",textTransform:"uppercase",letterSpacing:0.3,whiteSpace:"nowrap",overflow:"hidden"}}>{h}</th>)}
        </tr></thead>
        <tbody>{doc.items.map((it,i)=>(
          <tr key={i} style={{background:i%2?"#f9fafb":"#fff",borderBottom:"1px solid #e5e7eb"}}>
            <td style={{padding:"6px 8px"}}>{editable?<input value={it.desc} onChange={e=>updItem(i,"desc",e.target.value)} onKeyDown={focusNext} placeholder="Description" style={{border:"1px solid #d1d5db",borderRadius:5,padding:"5px 7px",fontSize:12,outline:"none",width:"100%"}}/>:<span>{it.desc||"—"}</span>}</td>
            <td style={{padding:"6px 8px",textAlign:"right"}}>{editable?<input type="number" value={it.unit} onChange={e=>{const uv=e.target.value;if(it.rate){const amt=((parseFloat(String(it.rate).replace(/[^0-9.\-]/g,""))||0)*(parseFloat(uv)||1)).toFixed(2);updItemMulti(i,{unit:uv,amount:amt});}else{updItem(i,"unit",uv);}}} onKeyDown={focusNext} style={{border:"1px solid #d1d5db",borderRadius:5,padding:"5px 4px",fontSize:12,outline:"none",width:"100%",textAlign:"right"}}/>:<span>{fmtNum(it.unit)}</span>}</td>
            <td style={{padding:"6px 4px",textAlign:"center"}}>{editable?<select value={it.currency} onChange={e=>updItem(i,"currency",e.target.value)} onKeyDown={focusNext} style={{border:"1px solid #d1d5db",borderRadius:5,padding:"5px 2px",fontSize:11,outline:"none",width:"100%"}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select>:<span>{it.currency||"USD"}</span>}</td>
            <td style={{padding:"6px 8px",textAlign:"right"}}>{editable?<input value={it.rate} onChange={e=>{const rv=e.target.value;const amt=((parseFloat(rv.replace(/[^0-9.\-]/g,""))||0)*(parseFloat(it.unit)||1)).toFixed(2);updItemMulti(i,{rate:rv,amount:amt});}} onKeyDown={focusNext} placeholder="rate or %" style={{border:"1px solid #d1d5db",borderRadius:5,padding:"5px 4px",fontSize:12,outline:"none",width:"100%",textAlign:"right"}}/>:<span>{it.rate||""}</span>}</td>
            <td style={{padding:"6px 8px",textAlign:"right"}}>{editable?<input type="number" value={it.amount} onChange={e=>updItem(i,"amount",e.target.value)} onKeyDown={focusNext} style={{border:"1px solid #d1d5db",borderRadius:5,padding:"5px 4px",fontSize:12,outline:"none",width:"100%",textAlign:"right",fontWeight:700}}/>:<span style={{fontWeight:700}}>{fmtNum(it.amount)}</span>}</td>
            <td style={{padding:"6px 8px"}}>{editable?<input value={it.remark} onChange={e=>updItem(i,"remark",e.target.value)} onKeyDown={focusNext} style={{border:"1px solid #d1d5db",borderRadius:5,padding:"5px 4px",fontSize:12,outline:"none",width:"100%"}}/>:<span>{it.remark||""}</span>}</td>
            {editable&&<td style={{padding:"6px 4px",textAlign:"center"}}>{doc.items.length>1&&<button onClick={()=>removeItem(i)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}</td>}
          </tr>
        ))}</tbody>
      </table>
      {editable&&<button onClick={addItem} style={{marginBottom:14,padding:"5px 16px",border:`1px dashed ${co.primary}`,borderRadius:6,background:"transparent",color:co.primary,cursor:"pointer",fontWeight:700,fontSize:12}}>+ Add Line Item</button>}
      <div style={{display:"flex",justifyContent:"flex-end",margin:"12px 0 20px"}}>
        <div style={{border:`2px solid ${co.primary}`,borderRadius:8,padding:"10px 22px",minWidth:240,textAlign:"right"}}>
          <div style={{fontSize:10,color:"#6b7280",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Total {lbl.amount}</div>
          <div style={{fontSize:21,fontWeight:700,color:co.primary}}>{doc.items[0]?.currency||"USD"}&nbsp;&nbsp;{total.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
      </div>
      {isCreditNote(doc)&&<div style={{fontSize:11,color:"#9ca3af",fontStyle:"italic",textAlign:"right",marginBottom:8,marginTop:-8}}>This credit note will be applied against outstanding or future invoices.</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:28,borderTop:`2px solid ${co.primary}`,paddingTop:14,marginTop:20}}>
        <div>
          <div style={{fontWeight:700,fontSize:10,color:co.secondary,textDecoration:"underline",letterSpacing:0.5,textTransform:"uppercase",marginBottom:10}}>Bank Account Info ({bank.currency})</div>
          {[["Bank Name",bank.name],["Bank Code",bank.bankCode],["Bank Address",bank.address],["Account No.",bank.account],["SWIFT",bank.swift],["Beneficiary",bank.beneficiary]].filter(([,v])=>v).map(([l,v])=>(
            <div key={l} style={{display:"grid",gridTemplateColumns:"110px 1fr",gap:"0 8px",marginBottom:4}}>

          ))}

          <div style={{fontWeight:700,fontSize:12,color:co.primary,lineHeight:1.6,width:"100%",textAlign:"right",marginBottom:12}}>{co.short}</div>
          <div style={{width:"100%",display:"flex",flexDirection:"column",alignItems:"center",marginTop:"auto"}}>
            {co.signature&&<img src={co.signature} alt="sig" style={{height:56,maxWidth:180,objectFit:"contain",objectPosition:"center",display:"block",marginBottom:4}}/>}
            <div style={{borderTop:"1px solid #d1d5db",paddingTop:6,width:"70%",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#6b7280",letterSpacing:0.5}}>Authorized Signature(s)</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
});

// ── HISTORY POPUP ─────────────────────────────────────────────────────────────
function HistoryPopup({onClose}){
  const[logs]=useState(()=>loadLog().filter(e=>e.type==="print"));
  const[expandedId,setExpandedId]=useState(null);
  const shipLabels={pol:"P.O.L",vessel:"Vessel / Voyage",finalDest:"Final Destination",etd:"ETD",eta:"ETA",packages:"Packages (PCS)",shipper:"Shipper",weight:"Weight (KG)",cbm:"CBM",shipMode:"Ship Mode",containerNo:"Container No.",consignee:"Consignee"};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:900,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{background:"#1e3a5f",borderRadius:"16px 16px 0 0",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:0}}>
          {logs.length===0
            ?<div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}>
              <div style={{fontSize:40,marginBottom:12}}>📭</div>
              <div style={{fontSize:15,fontWeight:600}}>No documents printed yet</div>
              <div style={{fontSize:13,marginTop:4}}>Documents will appear here after you save a PDF.</div>

              <thead><tr style={{background:"#f1f5f9",position:"sticky",top:0,zIndex:1}}>

                  <th key={h} style={{padding:"9px 10px",textAlign:"left",fontWeight:700,fontSize:11,color:"#374151",textTransform:"uppercase",letterSpacing:0.3,borderBottom:"2px solid #e5e7eb"}}>{h}</th>
                )}

              <tbody>{logs.map((e,i)=>{
                const isExpanded=expandedId===e.id;
                const ship=e.shipment||{};
                const items=e.items||[];
                const hasShip=Object.values(ship).some(v=>v&&String(v).trim());
                return(<React.Fragment key={e.id}>
                  <tr style={{background:i%2?"#f9fafb":"#fff",borderBottom:"1px solid #f3f4f6",cursor:"pointer"}} onClick={()=>setExpandedId(isExpanded?null:e.id)}>
                    <td style={{padding:"8px 10px",fontWeight:700,color:"#1e3a5f"}}>{e.docNumber||"—"}</td>
                    <td style={{padding:"8px 10px"}}>{e.docType||"—"}</td>
                    <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{e.date||"—"}</td>
                    <td style={{padding:"8px 10px",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.client||"—"}</td>
                    <td style={{padding:"8px 10px"}}>{e.currency||"—"}</td>
                    <td style={{padding:"8px 10px",fontWeight:600}}>{e.total?fmtNum(e.total):"—"}</td>
                    <td style={{padding:"8px 10px",color:"#6b7280"}}>{e.user||"—"}</td>
                    <td style={{padding:"8px 10px",color:"#6b7280",whiteSpace:"nowrap",fontSize:11}}>{e.ts||"—"}</td>
                    <td style={{padding:"8px 10px",color:"#9ca3af",fontSize:14}}>{isExpanded?"▲":"▼"}</td>
                  </tr>
                  {isExpanded&&<tr><td colSpan={9} style={{padding:0,background:"#f8fafc",borderBottom:"2px solid #e5e7eb"}}>
                    <div style={{padding:"14px 20px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 40px",marginBottom:14}}>
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:"#3a7bd5",textTransform:"uppercase",marginBottom:6}}>Party Details</div>
                          <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>{e.client||"—"}</div>
                          <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{e.clientAddress||"—"}</div>
                        </div>
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:"#3a7bd5",textTransform:"uppercase",marginBottom:6}}>References</div>
                          <div style={{display:"grid",gridTemplateColumns:"100px 1fr",gap:"3px 8px",fontSize:12}}>
                            {[["Date",e.date],["Doc #",e.docNumber],["MBL",e.mbl],["HBL",e.hbl],["Customer Ref",e.customerRef],["Company",e.companyName]].filter(([,v])=>v).map(([l,v])=>
                              <React.Fragment key={l}><span style={{fontWeight:700,color:"#374151"}}>{l}:</span><span>{v}</span></React.Fragment>
                            )}
                          </div>
                        </div>
                      </div>
                      {hasShip&&<div style={{marginBottom:14}}>
                        <div style={{fontSize:10,fontWeight:700,color:"#3a7bd5",textTransform:"uppercase",marginBottom:6}}>Shipment Details</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"6px 16px",background:"#fff",borderRadius:8,padding:"10px 12px",border:"1px solid #e5e7eb"}}>
                          {Object.entries(shipLabels).map(([k,l])=>{const v=ship[k];return v?<div key={k}><div style={{fontSize:9,fontWeight:700,color:"#6b7280",textTransform:"uppercase"}}>{l}</div><div style={{fontSize:12,marginTop:1}}>{v}</div></div>:null;}).filter(Boolean)}
                        </div>
                      </div>}
                      {items.length>0&&<div>
                        <div style={{fontSize:10,fontWeight:700,color:"#3a7bd5",textTransform:"uppercase",marginBottom:6}}>Line Items</div>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,background:"#fff",borderRadius:8,overflow:"hidden",border:"1px solid #e5e7eb"}}>
                          <thead><tr style={{background:"#1e3a5f"}}>
                            {["Description","Unit","Currency","Rate","Amount","Remark"].map(h=>
                              <th key={h} style={{padding:"6px 8px",color:"#fff",textAlign:["Rate","Amount"].includes(h)?"right":"left",fontWeight:700,fontSize:10}}>{h}</th>
                            )}
                          </tr></thead>
                          <tbody>{items.map((it,ii)=>
                            <tr key={ii} style={{background:ii%2?"#f9fafb":"#fff",borderBottom:"1px solid #f3f4f6"}}>
                              <td style={{padding:"5px 8px"}}>{it.desc||"—"}</td>
                              <td style={{padding:"5px 8px",textAlign:"right"}}>{fmtNum(it.unit)}</td>
                              <td style={{padding:"5px 8px"}}>{it.currency||"USD"}</td>
                              <td style={{padding:"5px 8px",textAlign:"right"}}>{it.rate||""}</td>
                              <td style={{padding:"5px 8px",textAlign:"right",fontWeight:700}}>{fmtNum(it.amount)}</td>
                              <td style={{padding:"5px 8px",color:"#6b7280"}}>{it.remark||""}</td>
                            </tr>
                          )}</tbody>
                        </table>
                      </div>}
                    </div>
                  </td></tr>}
                </React.Fragment>);
              })}</tbody>
            </table>
          }
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[currentUser,setCurrentUser]=useState(null);
  const[companies,setCompanies]=useState(initCompanies);
  const[fx,setFx]=useState(initFx);
  const[showMaint,setShowMaint]=useState(false);
  const[screen,setScreen]=useState("ops");
  const[mode,setMode]=useState(null);
  const[singleCompany,setSingleCompany]=useState("jks");
  const[singleDocType,setSingleDocType]=useState("Credit Note");
  const[srcData,setSrcData]=useState(null);
  const[mapping,setMapping]=useState({});
  const[defaults,setDefaults]=useState({COMPANY_ID:"",CURRENCY:""});
  const[docs,setDocs]=useState([]);
  const[activeIdx,setActiveIdx]=useState(0);
  const[fileErr,setFileErr]=useState("");
  const[loading,setLoading]=useState(false);
  const[pdfProgress,setPdfProgress]=useState(null);
  const[postPrintData,setPostPrintData]=useState(null);
  const[showHistory,setShowHistory]=useState(false);
  const fileRef=useRef();

  const getCompany=id=>companies.find(c=>c.id===id)||companies[0];

  const handleFile=async file=>{
    if(!file)return;setFileErr("");setLoading(true);
    try{
      let parsed;
      if(file.name.endsWith(".csv")){parsed=parseCSV(await file.text());}
      else{parsed=await parseXLSX(file);}
      if(!parsed.headers.length)throw new Error("No headers found.");
      setSrcData(parsed);setMapping(autoMatch(parsed.headers));setMode("bulk");setScreen("map");
    }catch(e){setFileErr("Error: "+e.message);}
    setLoading(false);
  };
  const onDrop=useCallback(e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);});
  const handleProceed=()=>{setDocs(groupIntoDocs(srcData.rows,mapping,companies));setActiveIdx(0);setScreen("preview");};
  const startSingle=()=>{setMode("single");setDocs([emptyDoc(singleCompany,singleDocType)]);setActiveIdx(0);setScreen("preview");};
  const goBack=()=>setScreen(mode==="single"?"ops":"map");

  // ── Stable onChange for DocLayout (prevents focus loss on re-render) ──
  const docChangeHandlers=useRef({});
  const getDocChangeHandler=useCallback((i)=>{
    if(!docChangeHandlers.current[i]){
      docChangeHandlers.current[i]=nd=>setDocs(prev=>prev.map((x,j)=>j===i?nd:x));
    }
    return docChangeHandlers.current[i];
  },[]);

  // ── PDF helpers ──────────────────────────────────────────────────────────
  const savePDF=async(doc,co)=>{
    const bank=getBankForDoc(doc,companies);
    const pdf=await generatePDF(doc,co,bank);
    const blob=pdf.output("blob");
    const fname=`${(doc.docNumber||"document").replace(/[^a-zA-Z0-9\-_]/g,"_")}.pdf`;
    downloadBlob(blob,fname);
    const total=doc.items.reduce((s,i)=>s+(parseFloat(i.amount)||0),0).toFixed(2);
    addLog({type:"print",user:currentUser,docNumber:doc.docNumber,docType:doc.docType,
      client:doc.party?.name||"",clientAddress:doc.party?.address||"",
      currency:doc.items[0]?.currency||"",total,
      date:doc.date,mbl:doc.mbl,hbl:doc.hbl,customerRef:doc.customerRef,
      companyId:doc.companyId,companyName:co.name,
      shipment:doc.shipment||{},items:doc.items||[],
      detail:`${currentUser} printed ${doc.docNumber}`});
  };

  const handleSinglePDF=async()=>{
    const doc=docs[activeIdx];
    const co=getCompany(doc?.companyId||singleCompany);
    await savePDF(doc,co);
    const printedAt=new Date().toLocaleString();
    generateSummaryXLSX([doc],companies,currentUser,printedAt);
    // Delay popup until after XLSX download to avoid React state update interruption
    setTimeout(()=>setPostPrintData({docs:[doc],printedBy:currentUser}),300);
  };

  // ── BATCH ZIP — fixed v25 ──────────────────────────────────────────────────
  const handleBatchPDF=async()=>{
    const zip=new JSZip();
    const errors=[];
    setPdfProgress({current:0,total:docs.length,label:"Starting..."});

    for(let i=0;i<docs.length;i++){
      const doc=docs[i];
      const co=getCompany(doc.companyId);
      setPdfProgress({current:i+1,total:docs.length,label:`Building ${doc.docNumber||`Doc ${i+1}`}...`});
      await new Promise(r=>setTimeout(r,30)); // yield to UI

      try{
        const bank=getBankForDoc(doc,companies);
        const pdf=await generatePDF(doc,co,bank);
        const pdfBytes=pdf.output("arraybuffer");
        const fname=`${(doc.docNumber||`doc_${i+1}`).replace(/[^a-zA-Z0-9\-_]/g,"_")}.pdf`;
        zip.file(fname,pdfBytes);
        addLog({type:"print",user:currentUser,docNumber:doc.docNumber,docType:doc.docType,
          client:doc.party?.name||"",currency:doc.items[0]?.currency||"",
          total:doc.items.reduce((s,it)=>s+(parseFloat(it.amount)||0),0).toFixed(2),
          detail:`${currentUser} printed ${doc.docNumber}`});
      }catch(err){
        console.error(`Error generating ${doc.docNumber}:`,err);
        errors.push(`${doc.docNumber}: ${err.message}`);
      }
    }

    setPdfProgress({current:docs.length,total:docs.length,label:"Packaging ZIP..."});
    await new Promise(r=>setTimeout(r,80));

    try{
      const zipBlob=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:4}});
      const zipName=`CR_DN_Batch_${currentUser}_${new Date().toISOString().slice(0,10)}.zip`;
      downloadBlob(zipBlob,zipName);
    }catch(err){
      alert("ZIP packaging failed: "+err.message);
    }

    setPdfProgress(null);

    const printedAt=new Date().toLocaleString();
    addLog({type:"batch",user:currentUser,
      detail:`${currentUser} batch-printed ${docs.length-errors.length}/${docs.length} docs`,
      docNumber:`${docs.length} docs`,
      docType:[...new Set(docs.map(d=>d.docType))].join("/")});
    generateSummaryXLSX(docs,companies,currentUser,printedAt);
    // Delay popup until after XLSX download to avoid React state update interruption
    setTimeout(()=>setPostPrintData({docs,printedBy:currentUser}),300);

    if(errors.length){
      alert(`⚠️ ${errors.length} doc(s) had errors:\n\n${errors.join("\n")}`);
    }
  };

  const MaintBtn=()=><button onClick={()=>setShowMaint(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>⚙️ Maintenance</button>;
  const UserBadge=()=><div style={{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:600,color:"#fff"}}>👤 {currentUser}</div>;

  if(!currentUser)return<LoginPage onLogin={setCurrentUser}/>;

  if(screen==="ops") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      {showMaint&&<Maintenance companies={companies} setCompanies={setCompanies} fx={fx} setFx={setFx} onClose={()=>setShowMaint(false)}/>}
      {showHistory&&<HistoryPopup onClose={()=>setShowHistory(false)}/>}
      <div style={{background:"#fff",borderRadius:18,boxShadow:"0 8px 40px rgba(0,0,0,0.3)",padding:40,maxWidth:600,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:24,fontWeight:900,color:"#1e3a5f"}}>Credit / Debit Note Printer</div>
          <div style={{color:"#6b7280",fontSize:13,marginTop:4}}>JKS Group · Operations Tool</div>
          <div style={{marginTop:10,display:"inline-block",background:"#eff6ff",borderRadius:20,padding:"4px 14px",fontSize:13,color:"#1e3a5f",fontWeight:600}}>👤 Signed in as {currentUser}</div>
        </div>
        <div style={{marginBottom:22}}>
          <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:12}}>① Choose Mode</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div onClick={()=>setMode("single")} style={{padding:"20px 14px",border:`2px solid ${mode==="single"?"#1e3a5f":"#e5e7eb"}`,borderRadius:12,cursor:"pointer",textAlign:"center",background:mode==="single"?"#eff6ff":"#fafafa"}}>
              <div style={{fontSize:28,marginBottom:8}}>📝</div>
              <div style={{fontWeight:700,color:"#1e3a5f",fontSize:14}}>Single Entry</div>
              <div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>Fill one document manually</div>
            </div>
            <div onClick={()=>fileRef.current.click()} style={{padding:"20px 14px",border:"2px solid #e5e7eb",borderRadius:12,cursor:"pointer",textAlign:"center",background:"#fafafa"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#1e3a5f"} onMouseLeave={e=>e.currentTarget.style.borderColor="#e5e7eb"}>
              <div style={{fontSize:28,marginBottom:8}}>📊</div>
              <div style={{fontWeight:700,color:"#1e3a5f",fontSize:14}}>Bulk Upload</div>
              <div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>CSV / XLS — auto-maps columns</div>
            </div>
          </div>
          <input ref={fileRef} type="file" accept=".csv,.xls,.xlsx" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          {loading&&<div style={{marginTop:12,textAlign:"center",color:"#6b7280",fontSize:13}}>⏳ Reading file...</div>}
          {fileErr&&<div style={{marginTop:10,padding:"10px 14px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,color:"#dc2626",fontSize:13}}>{fileErr}</div>}
        </div>
        {mode==="single"&&(
          <div style={{padding:18,background:"#f8fafc",borderRadius:12,border:"1px solid #e5e7eb",marginBottom:18}}>
            <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:14}}>② Company & Document Type</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:5,textTransform:"uppercase",letterSpacing:0.4}}>Company Header</div>
                <select value={singleCompany} onChange={e=>setSingleCompany(e.target.value)} style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 8px",fontSize:13,outline:"none"}}>
                  {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:5,textTransform:"uppercase",letterSpacing:0.4}}>Document Type</div>
                <select value={singleDocType} onChange={e=>setSingleDocType(e.target.value)} style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"7px 8px",fontSize:13,outline:"none"}}>
                  {DOC_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
            <button onClick={startSingle} style={{width:"100%",padding:"11px",borderRadius:8,border:"none",background:"#1e3a5f",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>Start Document →</button>
          </div>
        )}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setShowHistory(true)} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid #d1d5db",background:"#fff",color:"#374151",cursor:"pointer",fontWeight:600,fontSize:13}}>📋 History</button>
          <button onClick={()=>setShowMaint(true)} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid #d1d5db",background:"#fff",color:"#374151",cursor:"pointer",fontWeight:600,fontSize:13}}>⚙️ Maintenance</button>
          <button onClick={()=>setCurrentUser(null)} style={{padding:"9px 16px",borderRadius:8,border:"1px solid #e5e7eb",background:"#f9fafb",color:"#6b7280",cursor:"pointer",fontWeight:600,fontSize:13}}>Sign Out</button>
        </div>
      </div>
    </div>
  );

  if(screen==="map") return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      {showMaint&&<Maintenance companies={companies} setCompanies={setCompanies} fx={fx} setFx={setFx} onClose={()=>setShowMaint(false)}/>}
      <div style={{background:"#1e3a5f",color:"#fff",display:"flex",alignItems:"center",gap:10,padding:"10px 20px",flexWrap:"wrap"}}>
        <button onClick={()=>setScreen("ops")} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>← Back to Ops</button>
        <div style={{fontWeight:800,fontSize:15,flex:1}}>Map Columns — CR/DN Printer</div>
        <UserBadge/><MaintBtn/>
      </div>
      <div style={{padding:24}}><DataMapper srcData={srcData} mapping={mapping} setMapping={setMapping} defaults={defaults} setDefaults={setDefaults} onProceed={handleProceed} onBack={()=>setScreen("ops")}/></div>
    </div>
  );

  if(screen==="preview"){
    const isSingle=mode==="single";
    const activeDoc=docs[activeIdx]||docs[0];
    return(
      <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
        {showMaint&&<Maintenance companies={companies} setCompanies={setCompanies} fx={fx} setFx={setFx} onClose={()=>setShowMaint(false)}/>}
        {postPrintData&&<PostPrintPopup docs={postPrintData.docs} printedBy={postPrintData.printedBy} companies={companies} onClose={()=>setPostPrintData(null)}/>}

        {pdfProgress&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:998,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{background:"#fff",borderRadius:16,padding:"32px 40px",textAlign:"center",minWidth:340,boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
              <div style={{fontSize:36,marginBottom:12}}>📄</div>
              <div style={{fontWeight:800,fontSize:16,color:"#1e3a5f",marginBottom:6}}>Building PDF Package...</div>
              <div style={{fontSize:13,color:"#6b7280",marginBottom:16}}>{pdfProgress.label}</div>
              <div style={{background:"#e5e7eb",borderRadius:999,height:8,overflow:"hidden",marginBottom:8}}>
                <div style={{background:"#1e3a5f",height:"100%",borderRadius:999,transition:"width .3s",width:`${(pdfProgress.current/pdfProgress.total)*100}%`}}/>
              </div>
              <div style={{fontSize:12,color:"#9ca3af"}}>{pdfProgress.current} of {pdfProgress.total} — downloads as one ZIP when complete</div>
            </div>
          </div>
        )}

        <div style={{background:"#1e3a5f",color:"#fff",display:"flex",alignItems:"center",gap:10,padding:"10px 20px",flexWrap:"wrap"}}>
          <button onClick={goBack} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>
            {isSingle?"← Back to Ops":"← Back to Mapper"}
          </button>
          <div style={{fontWeight:800,fontSize:15,flex:1}}>{isSingle?`${activeDoc?.docType||"Document"} — Single Entry`:`${docs.length} Document${docs.length>1?"s":""} — Bulk`}</div>
          <UserBadge/><MaintBtn/>
          <button onClick={handleSinglePDF} style={{background:"#3a7bd5",color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>📄 Save PDF</button>
          {!isSingle&&docs.length>1&&<button onClick={handleBatchPDF} style={{background:"#22c55e",color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>📦 Save All PDFs ({docs.length})</button>}
        </div>

        {!isSingle&&docs.length>1&&(
          <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"10px 20px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#6b7280",fontWeight:600,marginRight:4}}>Documents:</span>
            {docs.map((d,i)=>{const c=getCompany(d.companyId);return(
              <button key={i} onClick={()=>setActiveIdx(i)}
                style={{padding:"5px 14px",borderRadius:6,border:`2px solid ${activeIdx===i?c.primary:"#e5e7eb"}`,background:activeIdx===i?`${c.primary}18`:"#fafafa",color:activeIdx===i?c.primary:"#374151",cursor:"pointer",fontWeight:activeIdx===i?700:500,fontSize:12,whiteSpace:"nowrap"}}>
                {d.docNumber||`Doc ${i+1}`}<span style={{marginLeft:5,fontSize:10,opacity:0.7}}>{(d.docType||"").split(" ")[0]}</span>
              </button>
            );})}
          </div>
        )}

        <div style={{padding:24}}>
          {docs.map((d,i)=>(
            <div key={i} style={{display:i===activeIdx?"block":"none",background:"#fff",borderRadius:14,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",marginBottom:24,overflow:"hidden"}}>
              <DocLayout doc={d} co={getCompany(d.companyId)} editable={isSingle} onChange={isSingle?getDocChangeHandler(i):undefined} companies={companies}/>
            </div>
          ))}
        </div>

        <div style={{position:"sticky",bottom:0,background:"#fff",borderTop:"1px solid #e5e7eb",padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 -2px 10px rgba(0,0,0,0.07)"}}>
          <button onClick={goBack} style={{padding:"9px 22px",borderRadius:8,border:"1px solid #d1d5db",background:"#fff",color:"#374151",cursor:"pointer",fontWeight:600,fontSize:13}}>
            {isSingle?"← Back to Ops":"← Back to Mapper — Edit Column Mapping"}
          </button>
          <div style={{fontSize:12,color:"#9ca3af"}}>{isSingle?"Edit fields then save PDF":"Review docs · use tabs to navigate"}</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleSinglePDF} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#3a7bd5",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>📄 Save PDF — {activeDoc?.docNumber||"this doc"}</button>
            {!isSingle&&docs.length>1&&<button onClick={handleBatchPDF} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#22c55e",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>📦 Save All PDFs ({docs.length})</button>}
          </div>
        </div>
      </div>
    );
  }
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
